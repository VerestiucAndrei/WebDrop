<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebDrop</title>
    <style>
        body {
            background: #121212;
            color: #e0e0e0;
            font-family: sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: #1e1e1e;
            color: white;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .file-section {
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
        }

        #fileDisplay {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e1e;
            border-radius: 8px;
        }

        a {
            color: #007aff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="loginScreen"
        style="background: #121212; position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center;">
        <h2>WebDrop Login</h2>
        <input type="email" id="emailInput" placeholder="Email"
            style="margin: 10px; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #1e1e1e; color: white;">
        <input type="password" id="passInput" placeholder="Password"
            style="margin: 10px; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #1e1e1e; color: white;">
        <button onclick="manualLogin()">Login</button>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin: 0;">WebDrop</h1>

        <button onclick="refreshApp()" id="refreshButton"
            style="background: #333; color: white; border: 1px solid #555; padding: 8px 12px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 5px;">
            <span id="refreshIcon" style="font-size: 16px;">↻</span>
        </button>
    </div>

    <div style="background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 12px;">
        <span>Cloud Storage Used: </span>
        <span id="usageStat"></span> / 5 GB
        <div style="width: 100%; height: 5px; background: #333; margin-top: 5px; border-radius: 5px;">
            <div id="usageBar" style="width: 0%; height: 100%; background: #007aff; border-radius: 5px;"></div>
        </div>
    </div>

    <textarea id="clip" placeholder="Paste text here..."></textarea>

    <div class="file-section">
        <h3>File Vault</h3>
        <input type="file" id="filePicker">
        <br>
        <button onclick="uploadFile()">Upload File</button>
        <div id="status">Ready.</div>
    </div>

    <div id="fileManager" style="margin-top: 20px; padding: 15px; background: #1e1e1e; border-radius: 8px;">
        <h3>My Uploaded Files</h3>
        <ul id="fileList" style="list-style-type: none; padding: 0;"></ul>
    </div>

    <script type="module" src="script.js?v1.64"></script>
</body>

</html>
